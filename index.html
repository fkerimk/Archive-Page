<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title></title>
        <link rel="icon" type="image/x-icon" href="static/icon.png">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="static/theme.css">
        <link rel="stylesheet" href="static/style.css">
        <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
        <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    </head>

    <body>
        <div id="sidebar-overlay" class="mobile-only"></div>

        <div id="details-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3><i class="fa-solid fa-circle-info"></i> Details</h3>
                    <span class="close-modal">&times;</span>
                </div>
                <div class="modal-body md-view" id="details-modal-body">
                </div>
            </div>
        </div>

        <sidebar>
            <a href="#/" class="logo-area">
                <img src="static/icon.png" alt="logo">
                <h2></h2>
            </a>

            <form onsubmit="event.preventDefault();">
                <input type="text" id="search-input" class="search-bar" placeholder="Search..." autocomplete="off">
            </form>

            <div id="parent-dir-container"></div>

            <div class="file-list" id="file-list">
                <!-- File items rendered dynamically by JavaScript -->
            </div>

            <div id="bgm-bar" style="display: none;">
                <audio id="bgm-audio" loop preload="auto"></audio>
                <button id="bgm-play-btn" title="Play/Pause"><i class="fa-solid fa-play"></i></button>
                <span class="bgm-label">BGM</span>
                <input type="range" id="bgm-volume" min="0" max="1" step="0.01" value="0.05" title="Volume">
            </div>
        </sidebar>

        <main>
            <div class="top-bar">
                <button id="mobile-menu-toggle" class="mobile-only"><i class="fa-solid fa-bars"></i></button>
                <div class="breadcrumb" id="breadcrumb">
                    <!-- Breadcrumbs rendered dynamically by JavaScript -->
                </div>
            </div>

            <div class="download-container-top" id="top-actions-bar" style="display: none;">
                <!-- Actions bar (Download, Source, Details) rendered dynamically by JavaScript -->
            </div>

            <div id="main-content">
                <!-- Dynamic Preview Content rendered by JavaScript -->
            </div>

            <div class="tags-container" id="tags-container" style="display: none;">
                <!-- Tags rendered dynamically by JavaScript -->
            </div>
        </main>

        <script src="static/script.js"></script>
    </body>

</html>
